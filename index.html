<script>

/* ---------- 경품 풀 (상품 당첨자에게 1인 1개씩 무작위 배정) ---------- */

];
function buildPrizePool(){

}

/* ---------- FIREBASE 설정 (반드시 본인 값으로 채워야 합니다) ---------- */
/*
  아래 FIREBASE_CONFIG 값을 본인의 Firebase 프로젝트 설정으로 바꿔주세요.
  Firebase 콘솔(console.firebase.google.com) > 프로젝트 설정 > 일반 > 내 앱 > 웹 앱에서
  "firebaseConfig" 객체를 복사해 그대로 덮어쓰면 됩니다.
*/

  apiKey: "AIzaSyBcq7D9X5hq0yjtTN5IRS4jchAC3a8rwwg",
  authDomain: "ox-quiz-2c1dd.firebaseapp.com",
  databaseURL: "https://ox-quiz-2c1dd-default-rtdb.firebaseio.com",

  appId: "1:331334430731:web:beccb637c7d11b5ed9970e"
};

let FIREBASE_READY = false;
let fbDb = null;
try{
  if(FIREBASE_CONFIG.apiKey && !String(FIREBASE_CONFIG.apiKey).includes("여기에")){
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database();
    FIREBASE_READY = true;
  }
}catch(e){
  console.error("Firebase 초기화 실패:", e);
}

/* ---------- storage helpers (Firebase Realtime Database 기반) ---------- */
let LAST_STORAGE_ERROR = "";
function describeStorageError(e){
  return (e && e.message) ? e.message : String(e);
}
function toPath(key){
  // 기존 "room:1234:p:E001" 형태의 키를 "room/1234/p/E001" 경로로 변환
  return key.replace(/:/g, "/");
}
async function storageGet(key){
  if(!FIREBASE_READY){
    LAST_STORAGE_ERROR = "Firebase 설정이 비어있습니다. 코드 상단의 FIREBASE_CONFIG를 채워주세요.";
    return null;
  }
  try{
    const snap = await fbDb.ref(toPath(key)).once("value");
    return snap.exists() ? snap.val() : null;
  }catch(e){
    LAST_STORAGE_ERROR = describeStorageError(e);
    return null;
  }
}
async function storageSet(key, obj){
  if(!FIREBASE_READY){
    LAST_STORAGE_ERROR = "Firebase 설정이 비어있습니다. 코드 상단의 FIREBASE_CONFIG를 채워주세요.";
    return false;
  }
  try{
    await fbDb.ref(toPath(key)).set(obj);
    return true;
  }catch(e){
    LAST_STORAGE_ERROR = describeStorageError(e);
    console.error("storage set failed:", e);
    return false;
  }
}
async function storageList(prefix){
  if(!FIREBASE_READY) return [];
  try{
    const path = toPath(prefix).replace(/\/$/, "");
    const snap = await fbDb.ref(path).once("value");
    if(!snap.exists()) return [];
    const keys = [];
    snap.forEach(child => { keys.push(path + "/" + child.key); });
    return keys;
  }catch(e){ return []; }
}
async function storageDelete(key){
  if(!FIREBASE_READY) return;
  try{ await fbDb.ref(toPath(key)).remove(); }catch(e){ /* non-fatal */ }
}
async function checkStorageHealth(){
  if(!FIREBASE_READY){
    LAST_STORAGE_ERROR = "Firebase 설정이 비어있습니다. 코드 상단의 FIREBASE_CONFIG 값을 본인의 Firebase 프로젝트 값으로 채워주세요.";
    return false;
  }
  const testKey = "room:__healthcheck__:" + Date.now();
  const ok = await storageSet(testKey, {t:Date.now()});
  if(!ok) return false;
  const back = await storageGet(testKey);
  await storageDelete(testKey);
  return !!back;
}

/* ---------- utils ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function makeRoomCode(){
  return String(Math.floor(1000 + Math.random()*9000));
}
function sanitizeId(raw){
  const s = (raw||"").trim().replace(/[^a-zA-Z0-9가-힣\-_]/g, "");
  return s.length ? s : ("g" + Math.random().toString(36).slice(2,8));
}
function sanitizeRoomCode(raw){
  const s = (raw||"").trim().replace(/[^a-zA-Z0-9]/g, "");
  return s;
}
function ensureRecordShape(rec){
  // Firebase Realtime Database는 빈 객체({})를 저장하지 않고 통째로 누락시키므로,
  // 다시 불러왔을 때 answers 등의 필드가 사라져 있을 수 있다. 항상 보정해준다.
  if(!rec) return rec;
  if(!rec.answers || typeof rec.answers !== "object") rec.answers = {};
  if(typeof rec.score !== "number") rec.score = 0;
  if(typeof rec.alive !== "boolean") rec.alive = true;
  if(!rec.key) rec.key = sanitizeId(rec.employeeId);
  return rec;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function detectBaseUrl(){
  try{
    const origin = location.origin;
    if(origin && /^https?:\/\//.test(origin)){
      return origin + location.pathname;
    }
  }catch(e){ /* ignore */ }
  return "";
}
function isValidBaseUrl(url){
  return /^https?:\/\/.+/.test(url || "");
}

/* ---------- entry / URL params ---------- */
function initFromUrl(){
  const params = new URLSearchParams(location.search);
  const role = params.get("role");
  const room = params.get("room");
  if(role === "participant"){
    App.screen = "join";
    App.room = room ? room.trim() : "";
  }
}

}

    <button class="btn btn-ghost" id="btn-manual-refresh" style="margin-top:1.2rem;">관리자가 새 게임을 시작했나요? 새로고침</button>
  </div>`;
}

/* ================= timer svg ================= */
function timerSvg(){
  const r = 42, c = 2*Math.PI*r;
  return `
  <div class="timer-box">
    <svg width="100%" height="100%" viewBox="0 0 102 102">
      <circle cx="51" cy="51" r="${r}" fill="none" stroke="#E3E8E0" stroke-width="8"/>
      <circle id="timer-ring" cx="51" cy="51" r="${r}" fill="none" stroke="#0F6E4F" stroke-width="8"
        stroke-dasharray="${c}" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 51 51)"/>
    </svg>
    <div class="timer-num" id="timer-num">${TIMER_SECONDS}</div>
  </div>`;
}
function updateTimerVisual(phaseStartedAt){
  const ring = document.getElementById("timer-ring");
  const num = document.getElementById("timer-num");
  if(!ring || !num) return;
  const r = 42, c = 2*Math.PI*r;
  const elapsed = (Date.now() - phaseStartedAt) / 1000;
  const frac = Math.min(Math.max(elapsed / TIMER_SECONDS, 0), 1);
  ring.setAttribute("stroke-dashoffset", String(c * frac));
  const remaining = Math.max(Math.ceil(TIMER_SECONDS - elapsed), 0);
  num.textContent = remaining;
  let color = "#0F6E4F";
  if(frac > 0.66) color = "#D9473D";
  else if(frac > 0.33) color = "#D9A636";
  ring.setAttribute("stroke", color);
}

/* ================= after render: bind events + side effects ================= */
function afterRender(){
  switch(App.screen){
    case "home":
      document.getElementById("btn-go-admin").onclick = () => { App.screen="admin-setup"; render(); };
      document.getElementById("btn-go-join").onclick = () => { App.screen="join"; render(); };
      break;

    case "admin-setup":
      document.querySelectorAll(".count-btn").forEach(b=>{
        b.onclick = () => { App.setupCount = Number(b.dataset.count); render(); };
      });
      document.getElementById("btn-create-room").onclick = onCreateRoom;
      document.getElementById("btn-back-home").onclick = () => {
        App.isRestart = false; App.room = null; App.state = null;
        App.participants = []; App.setupCount = null;
        App.screen = "home"; render();
      };
      break;

    case "admin-lobby":
      drawQr(joinUrl());
      document.getElementById("btn-start-quiz").onclick = onStartQuiz;
      document.getElementById("btn-regen-qr").onclick = () => {
        const val = document.getElementById("in-baseurl").value.trim();
        App.baseUrl = val;
        render();
      };
      document.getElementById("btn-copy-link").onclick = async () => {
        const link = joinUrl();
        try{
          await navigator.clipboard.writeText(link);
          alert("참가자 링크를 복사했습니다:\n" + link);
        }catch(e){
          prompt("아래 링크를 복사하세요:", link);
        }
      };
      refreshParticipants().then(updateLobbyList);
      break;

    case "admin-question":
      updateTimerVisual(App.state.phaseStartedAt);
      startTicker(() => updateTimerVisual(App.state.phaseStartedAt));
      document.getElementById("btn-reveal-answer").onclick = onRevealAnswer;
      document.getElementById("btn-end-quiz").onclick = onEndQuizEarly;
      refreshParticipants().then(updateSubmitCount);
      break;

    case "admin-answer":
      refreshParticipants().then(updateAliveStats);
      document.getElementById("btn-next-step").onclick = onNextStep;
      { const endBtn = document.getElementById("btn-end-quiz"); if(endBtn) endBtn.onclick = onEndQuizEarly; }
      break;

    case "admin-final":
      document.getElementById("btn-new-game").onclick = () => {
        App.isRestart = true;
        App.setupCount = null;
        App.screen = "admin-setup";
        render();
      };
      document.getElementById("btn-export-excel").onclick = onExportSurvivorsExcel;
      break;

    case "join":
      document.getElementById("btn-submit-join").onclick = onSubmitJoin;
      break;

    case "join-blocked":
      document.getElementById("btn-back-join").onclick = () => { App.screen="join"; render(); };
      break;

    case "wait": {
      // polling handles transition automatically; manual refresh as a safety net
      const refreshBtn = document.getElementById("btn-manual-refresh");
      if(refreshBtn) refreshBtn.onclick = () => location.reload();
      break;
    }

    case "p-question":
      stopTicker();
      if(App.myRecord && App.myRecord.alive){
        updateTimerVisual(App.state.phaseStartedAt);
        startTicker(() => updateTimerVisual(App.state.phaseStartedAt));
        document.getElementById("btn-pick-o").onclick = () => onSelectAnswer("O");
        document.getElementById("btn-pick-x").onclick = () => onSelectAnswer("X");
        document.getElementById("btn-submit-answer").onclick = onSubmitAnswer;
        const editBtn = document.getElementById("btn-edit-answer");
        if(editBtn) editBtn.onclick = onEditAnswer;
      } else {
        updateTimerVisual(App.state.phaseStartedAt);
        startTicker(() => updateTimerVisual(App.state.phaseStartedAt));
      }
      break;

    case "p-answer":
      stopTicker();
      break;

    case "p-final": {
      stopTicker();
      const refreshBtn = document.getElementById("btn-manual-refresh");
      if(refreshBtn) refreshBtn.onclick = () => location.reload();
      break;
    }
  }
}

/* ---------- QR ---------- */

/* ---------- ticker (visual countdown only, never blocks input) ---------- */
function startTicker(fn){

}
function stopTicker(){

/* ================= ADMIN ACTIONS ================= */
async function onCreateRoom(){
  const errEl = document.getElementById("create-error");
  if(errEl) errEl.textContent = "";

  const isRestart = !!(App.isRestart && App.room);
  const room = isRestart ? App.room : makeRoomCode();
  // 문제 배열은 이미 쉬운 문제 → 어려운 문제 순서로, 그리고 한국 대표팀 문제가 절반 이상
  // 섞여 들어가도록 정렬되어 있으므로, 순서를 섞지 않고 앞에서부터 그대로 사용한다.
  const order = [...Array(QUESTIONS.length).keys()].slice(0, App.setupCount);
  const state = {
    phase: "lobby",
    totalQuestions: App.setupCount,
    order,
    currentIndex: 0,
    phaseStartedAt: 0,
    createdAt: Date.now()
  };
  const ok = await storageSet(`room:${room}:state`, state);
  if(!ok){
    const msg = "게임방 생성에 실패했습니다: " + (LAST_STORAGE_ERROR || "알 수 없는 오류");
    if(errEl) errEl.textContent = msg; else alert(msg);
    return;
  }

  if(isRestart){
    const existingParticipants = await refreshParticipants();
    for(const p of existingParticipants){
      p.alive = true;
      p.score = 0;
      p.answers = {};
      delete p.prize;
      const key = p.key || sanitizeId(p.employeeId);
      await storageSet(`room:${room}:p:${key}`, p);
    }
  }

  App.role = "admin";
  App.room = room;
  App.state = state;
  App.baseUrl = App.baseUrl || detectBaseUrl();
  App.isRestart = false;
  App.screen = "admin-lobby";
  render();
}

async function refreshParticipants(){
  if(!App.room) return [];
  const keys = await storageList(`room:${App.room}:p:`);
  const list = [];
  for(const k of keys){
    const v = await storageGet(k);
    if(v) list.push(ensureRecordShape(v));
  }
  list.sort((a,b)=>a.joinedAt - b.joinedAt);
  App.participants = list;
  return list;
}

function updateLobbyList(){
  const countEl = document.getElementById("p-count");
  if(!countEl) return;
  countEl.textContent = App.participants.length;
}

async function onStartQuiz(){
  if(App.participants.length === 0){
    const proceed = confirm("참가자가 아직 없습니다. 그래도 시작할까요?");
    if(!proceed) return;
  }
  App.state.phase = "question";
  App.state.currentIndex = 0;
  App.state.phaseStartedAt = Date.now();
  await storageSet(`room:${App.room}:state`, App.state);
  App.screen = "admin-question";
  render();
}

function updateSubmitCount(){
  const el = document.getElementById("submit-count");
  if(!el) return;
  const idx = App.state.currentIndex;
  const alive = App.participants.filter(p=>p.alive);
  const answered = alive.filter(p=>p.answers && p.answers[idx]).length;
  el.textContent = `제출 ${answered} / ${alive.length}명`;
}

async function onRevealAnswer(){
  App.state.phase = "answer";
  await storageSet(`room:${App.room}:state`, App.state);
  App.screen = "admin-answer";
  render();
}

function updateAliveStats(){
  const aliveEl = document.getElementById("stat-alive");
  const outEl = document.getElementById("stat-out");
  if(!aliveEl || !outEl) return;
  const alive = App.participants.filter(p=>p.alive).length;
  const out = App.participants.length - alive;

  outEl.textContent = out;

async function onNextStep(){
  const isLast = App.state.currentIndex + 1 >= App.state.totalQuestions;
  if(isLast){
    await refreshParticipants();
    await assignPrizes();
    await refreshParticipants(); // 실제로 DB에 기록된 경품 값으로 다시 확인
    App.state.phase = "finished";
    await storageSet(`room:${App.room}:state`, App.state);
    App.screen = "admin-final";
    render();
  } else {
    App.state.currentIndex += 1;
    App.state.phase = "question";
    App.state.phaseStartedAt = Date.now();
    await storageSet(`room:${App.room}:state`, App.state);
    App.screen = "admin-question";
    render();
  }
}

async function onEndQuizEarly(){
  const sure = confirm("정말 퀴즈를 종료할까요? 더 이상 문제를 진행할 수 없고, 참가자 화면도 바로 최종 결과로 넘어갑니다.");
  if(!sure) return;
  await refreshParticipants();
  await assignPrizes();
  await refreshParticipants(); // 실제로 DB에 기록된 경품 값으로 다시 확인
  App.state.phase = "finished";
  await storageSet(`room:${App.room}:state`, App.state);
  App.screen = "admin-final";
  render();
}

async function assignPrizes(){
  const winners = App.participants.filter(p => p.alive);
  if(winners.length === 0) return;

  const alreadyHave = winners.filter(p => p.prize);
  const needPrize = winners.filter(p => !p.prize);
  if(needPrize.length === 0) return;

  // 전체 경품 풀에서, 이미 배정된 만큼을 빼서 "남은 수량"만 계산한다.
  const remainingPool = buildPrizePool();
  alreadyHave.forEach(p => {
    const idx = remainingPool.indexOf(p.prize);
    if(idx !== -1) remainingPool.splice(idx, 1);
  });
  const shuffledRemaining = shuffle(remainingPool);

  for(let i=0;i<needPrize.length;i++){
    const prize = i < shuffledRemaining.length ? shuffledRemaining[i] : null;
    if(prize === null){
      delete needPrize[i].prize;
    } else {
      needPrize[i].prize = prize;
    }
    const key = needPrize[i].key || sanitizeId(needPrize[i].employeeId);
    const ok = await storageSet(`room:${App.room}:p:${key}`, needPrize[i]);
    if(!ok){
      console.error("경품 저장 실패:", key, LAST_STORAGE_ERROR);
    }
  }
}

function onExportSurvivorsExcel(){
  if(typeof XLSX === "undefined"){
    alert("엑셀 내보내기 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.");
    return;
  }
  const totalCount = App.participants.length;
  const winners = App.participants
    .filter(p => p.alive)
    .slice()
    .sort((a,b)=>{
      if(b.score !== a.score) return b.score - a.score;
      return a.joinedAt - b.joinedAt;
    });
  if(winners.length === 0){
    alert("상품 당첨자가 없어 내보낼 명단이 없습니다.");
    return;
  }
  const aoa = [
    ["총 참여자 수", totalCount],
    ["상품 당첨자 수", winners.length],
    [],
    ["이름", "사번", "점수", "경품"]
  ];
  winners.forEach(p => aoa.push([p.name, p.employeeId, p.score, p.prize || "미배정"]));

  const worksheet = XLSX.utils.aoa_to_sheet(aoa);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "당첨자명단");
  const filename = `OX퀴즈_당첨자명단_방${App.room}.xlsx`;
  XLSX.writeFile(workbook, filename);
}

/* ================= PARTICIPANT ACTIONS ================= */
function routeParticipantByPhase(state, record){
  if(state.phase === "lobby"){
    App.localAnswered = false;
    App.localChoice = null;
    App.screen = "wait";
  } else if(state.phase === "question"){
    App.qIndex = state.currentIndex;
    App.localAnswered = !!(record.answers && record.answers[App.qIndex]);
    App.localChoice = App.localAnswered ? record.answers[App.qIndex].choice : null;
    App.screen = "p-question";
  } else if(state.phase === "answer"){
    App.qIndex = state.currentIndex;
    App.screen = "p-answer";
  } else if(state.phase === "finished"){
    App.screen = "p-final";
  } else {
    App.screen = "wait";
  }
}

function updateUrlWithEmp(room, empKey){
  try{
    const url = new URL(location.href);
    url.searchParams.set("role", "participant");
    url.searchParams.set("room", room);
    url.searchParams.set("emp", empKey);
    history.replaceState(null, "", url.toString());
  }catch(e){ /* 일부 환경(예: 샌드박스 iframe)에서는 막힐 수 있음 - 무시 */ }
}

// 새로고침/탭 재진입 시, URL에 저장된 방 코드+사번으로 자동 복귀를 시도한다.
// 성공하면 true, (방이나 내 기록을 찾지 못해) 실패하면 false를 반환한다.
async function tryAutoRejoin(room, empKey){
  const state = await storageGet(`room:${room}:state`);
  const record = await storageGet(`room:${room}:p:${empKey}`);
  if(!state || !record) return false;

  App.role = "participant";
  App.room = room;
  App.myRecord = ensureRecordShape(record);
  App.me = { employeeId: App.myRecord.employeeId, name: App.myRecord.name, key: empKey };
  App.state = state;
  routeParticipantByPhase(state, App.myRecord);
  render();
  return true;
}

async function onSubmitJoin(){
  const roomInput = sanitizeRoomCode(document.getElementById("in-room").value);
  const empRaw = document.getElementById("in-empid").value.trim();
  const nameRaw = document.getElementById("in-name").value.trim();
  const errEl = document.getElementById("join-error");

  if(!roomInput || !empRaw || !nameRaw){
    errEl.textContent = "게임방 코드, 사번, 이름을 모두 입력해주세요.";
    return;
  }

  const state = await storageGet(`room:${roomInput}:state`);
  if(!state){
    if(!FIREBASE_READY){
      errEl.textContent = "이 페이지의 데이터베이스 설정이 아직 안 되어 있습니다. 관리자에게 문의해주세요.";
    } else {
      errEl.textContent = "존재하지 않는 게임방 코드입니다. 코드를 다시 확인해주세요.";
    }
    return;
  }

  const empId = sanitizeId(empRaw);
  const existing = await storageGet(`room:${roomInput}:p:${empId}`);

  if(!existing && state.phase !== "lobby"){
    App.joinErrorMsg = "이미 시작된 게임입니다. 관리자에게 문의해주세요.";
    App.screen = "join-blocked";
    render();
    return;
  }

  let record = ensureRecordShape(existing);
  if(!record){
    record = {
      employeeId: empRaw,
      name: nameRaw,
      key: empId,
      joinedAt: Date.now(),
      alive: true,
      score: 0,
      answers: {}
    };
    await storageSet(`room:${roomInput}:p:${empId}`, record);
  }

  App.role = "participant";
  App.room = roomInput;
  App.me = { employeeId: empRaw, name: record.name, key: empId };
  App.state = state;
  App.myRecord = record;
  routeParticipantByPhase(state, record);
  updateUrlWithEmp(roomInput, empId);
  render();
}

function onSelectAnswer(choice){
  if(App.localAnswered) return;
  App.localChoice = choice;
  render();
}

async function onSubmitAnswer(){
  if(App.localAnswered || !App.localChoice) return;
  const idx = App.qIndex;
  const choice = App.localChoice;
  const btn = document.getElementById("btn-submit-answer");
  const errEl = document.getElementById("submit-error");
  if(errEl) errEl.textContent = "";
  if(btn){ btn.disabled = true; btn.textContent = "제출 중..."; }

  try{
    ensureRecordShape(App.myRecord);
    App.myRecord.answers[idx] = { choice, ts: Date.now() };
    const ok = await storageSet(`room:${App.room}:p:${App.me.key}`, App.myRecord);

    if(!ok){
      delete App.myRecord.answers[idx];
      if(errEl) errEl.textContent = "제출에 실패했습니다: " + (LAST_STORAGE_ERROR || "잠시 후 다시 시도해주세요.");
      if(btn){ btn.disabled = false; btn.textContent = "제출하기"; }
      return;
    }

    App.localAnswered = true;
    render();
  }catch(e){
    console.error("제출 중 예외 발생:", e);
    if(App.myRecord && App.myRecord.answers) delete App.myRecord.answers[idx];
    if(errEl) errEl.textContent = "제출 중 오류가 발생했습니다: " + (e && e.message ? e.message : String(e));
    if(btn){ btn.disabled = false; btn.textContent = "제출하기"; }
  }
}

async function onEditAnswer(){
  const idx = App.qIndex;
  try{
    if(App.myRecord && App.myRecord.answers){
      delete App.myRecord.answers[idx];
      await storageSet(`room:${App.room}:p:${App.me.key}`, App.myRecord);
    }
  }catch(e){
    console.error("수정하기 처리 중 오류:", e);
  }
  // 제출 상태만 취소한다. 직전에 골랐던 답은 그대로 선택되어 있어 바로 다시 제출하거나 바꿀 수 있다.
  App.localAnswered = false;
  render();
}

/* ================= POLLING LOOP (drives sync + transitions) ================= */
async function pollTick(){
  if(!App.room) return;
  const liveScreens = ["admin-lobby","admin-question","admin-answer","wait","p-question","p-answer","p-final"];
  if(!liveScreens.includes(App.screen)) return;

  const remote = await storageGet(`room:${App.room}:state`);
  if(!remote) return;
  App.state = remote;

  if(App.role === "admin"){
    await refreshParticipants();
    if(App.screen === "admin-lobby") updateLobbyList();
    if(App.screen === "admin-question") updateSubmitCount();
    if(App.screen === "admin-answer") updateAliveStats();
    return;
  }

  if(App.role === "participant"){
    await handleParticipantSync(remote);
  }
}

async function handleParticipantSync(remote){
  // refresh my own record (in case future logic needs latest score etc.)
  const myKey = `room:${App.room}:p:${App.me.key}`;

  if(App.screen === "wait"){
    if(remote.phase === "question"){
      App.qIndex = remote.currentIndex;
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.localAnswered = false;
      App.localChoice = null;
      App.screen = "p-question";
      render();
    } else if(remote.phase === "finished"){
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.screen = "p-final";
      render();
    }
    return;
  }

  if(App.screen === "p-question"){
    if(remote.phase === "answer" && remote.currentIndex === App.qIndex){
      await gradeMyAnswer(remote.currentIndex);
      App.screen = "p-answer";
      render();
    } else if(remote.phase === "finished"){
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.screen = "p-final";
      render();
    }
    return;
  }

  if(App.screen === "p-answer"){
    if(remote.phase === "question" && remote.currentIndex > App.qIndex){
      App.qIndex = remote.currentIndex;
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.localAnswered = false;
      App.localChoice = null;
      App.screen = "p-question";
      render();
    } else if(remote.phase === "finished"){
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.screen = "p-final";
      render();
    }
    return;
  }

  if(App.screen === "p-final"){
    // 관리자가 같은 인원으로 새 게임을 시작하면 phase가 lobby 또는 question으로 다시 바뀐다.
    if(remote.phase === "lobby"){
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.localAnswered = false;
      App.localChoice = null;
      App.screen = "wait";
      render();
    } else if(remote.phase === "question"){
      App.qIndex = remote.currentIndex;
      App.myRecord = ensureRecordShape(await storageGet(myKey) || App.myRecord);
      App.localAnswered = false;
      App.localChoice = null;
      App.screen = "p-question";
      render();
    }
    return;
  }
}

async function gradeMyAnswer(idx){
  const myKey = `room:${App.room}:p:${App.me.key}`;
  const fresh = await storageGet(myKey);
  if(fresh) App.myRecord = ensureRecordShape(fresh);

  // idempotent: only grade once per question index
  const existingAnswer = App.myRecord.answers && App.myRecord.answers[idx];
  if(existingAnswer && typeof existingAnswer.correct === "boolean") return;

  const correctAns = QUESTIONS[App.state.order[idx]].ans;

  if(!App.myRecord.answers) App.myRecord.answers = {};

  if(!existingAnswer){
    App.myRecord.answers[idx] = { choice:null, ts:Date.now(), correct:false };
    App.myRecord.alive = false;
  } else {
    const isCorrect = existingAnswer.choice === correctAns;
    existingAnswer.correct = isCorrect;
    if(isCorrect){
      App.myRecord.score = (App.myRecord.score || 0) + 1;
      App.myRecord.alive = true;
    } else {
      App.myRecord.alive = false;
    }
  }
  await storageSet(myKey, App.myRecord);
}

/* ================= boot ================= */
async function boot(){
  initFromUrl();
  render();

  const params = new URLSearchParams(location.search);
  if(params.get("role") === "participant" && params.get("room") && params.get("emp")){
    const ok = await tryAutoRejoin(params.get("room").trim(), params.get("emp").trim());
    if(!ok){
      // 자동 복귀에 실패하면 사번/이름을 다시 입력하는 입장 화면으로 안내한다.
      App.room = params.get("room").trim();
      App.screen = "join";
      render();
    }
  }

  checkStorageHealth().then(ok => {
    App.storageOk = ok;
    if(App.screen === "home" || App.screen === "admin-setup"){
      render();
    }
  });

  // 화면이 꺼졌다가 다시 켜지거나, 백그라운드에 있던 탭이 다시 보이게 되면
  // 다음 polling 주기를 기다리지 않고 바로 한 번 더 확인한다.
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible"){
      pollTick();
    }
  });

  setInterval(pollTick, POLL_MS);
}
boot();
</script>
